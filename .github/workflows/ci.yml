name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - uses: sbt/setup-sbt@v1
        with:
          # a warm sbt 2 build cache satisfies compile and test without
          # executing them, which skips coverage instrumentation output —
          # coverage runs need a cold build cache
          disk-cache: false

      - name: Test with coverage
        run: sbt --batch -Dcoverage=true "testFull; coverageReport"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/coverage-report/cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
